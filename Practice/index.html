<!DOCTYPE html>
<html lang="en" class="dark">  <!-- start in dark mode -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Character Counter</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="container">
      <h1>Character Counter</h1>
      <!-- Toggle switch coming in step 3  it should toggle in any 2 secs-->
      <div class="theme-toggle">
        <input type="checkbox" id="theme" />
        <label for="theme" aria-label="Toggle dark/light mode">☀️/🌙</label>
      </div>
    </div>
  </header>

  <main class="container">
    <h2>Analyze your text<br>in real-time.</h2>

    <textarea 
      placeholder="Start typing here... (or paste your text)"
      aria-label="Text input for analysis"
    ></textarea>

    <div class="options">
      <label><input type="checkbox" /> Exclude Spaces</label>
      <!-- Toggle switch coming in step 3  it should toggle in any 2 secs this also executes and shows well the toggle button and it's fucntion-->
      <label><input type="checkbox" /> Set Character Limit</label>
      <span>Approx. reading time: 0 minute</span>
    </div>

    <div class="stats">
      <div class="card purple">
        <span class="count">00</span>
        <p>Total Characters</p>
      </div>
      <div class="card orange">
        <span class="count">00</span>
        <p>Word Count</p>
      </div>
      <div class="card teal">
        <span class="count">00</span>
        <p>Sentence Count</p>
      </div>
    </div>

    <section class="density">
      <h3>Letter Density</h3>
      <p>No characters found. Start typing to see letter density.</p>
    </section>
  </main>
</body>
</html>
